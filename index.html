<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Köydensana.com | Yapım Aşamasında</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1b5e20, #66bb6a);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      opacity: 0.95;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      background: rgba(0,0,0,0.2);
      border-radius: 20px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .contact {
      margin-top: 25px;
      padding: 12px 18px;
      background: #ffffff;
      color: #1b5e20;
      display: inline-block;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
    }

    .contact:hover {
      background: #f1f1f1;
    }

    footer {
      margin-top: 30px;
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="badge">🚧 Yapım Aşamasında</div>

    <h1>Köydensana.com</h1>

    <p>
      Doğal köy ürünleri çok yakında sizlerle!<br>
      En taze zeytin, zeytinyağı, salça ve daha fazlası için hazırlıklarımız devam ediyor.
    </p>

    <p>
      🏡 Köyden sofranıza gelen doğal lezzetler yakında burada olacak.
    </p>

    <a class="contact" href="mailto:info@koydensana.com">
      Bize Ulaş
    </a>

    <footer>
      © 2026 Köydensana.com - Tüm hakları saklıdır.
    </footer>
  </div>
</body>
</html>
